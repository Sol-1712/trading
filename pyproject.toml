[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "crypto-quant"
version = "0.1.0"
dependencies = [
  "numpy",
  "pandas",
  "matplotlib",
  "pyarrow",
  "pybit",
  "jupyter",
  "ipykernel",
  "numba",
  "scipy",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["backtester*", "data*"]

